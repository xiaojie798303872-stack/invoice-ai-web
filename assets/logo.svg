<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="90" fill="#409EFF" opacity="0.1"/>
  <circle cx="100" cy="100" r="80" fill="#409EFF" opacity="0.15"/>
  <!-- 发票主体 -->
  <rect x="50" y="40" width="100" height="120" rx="8" fill="#409EFF" stroke="#337ECC" stroke-width="2"/>
  <!-- 发票顶部装饰线 -->
  <rect x="50" y="40" width="100" height="24" rx="8" fill="#337ECC"/>
  <rect x="50" y="56" width="100" height="8" fill="#337ECC"/>
  <!-- 发票标题文字区域 -->
  <rect x="70" y="46" width="60" height="12" rx="2" fill="white" opacity="0.9"/>
  <!-- 发票内容线条 -->
  <rect x="65" y="76" width="70" height="4" rx="2" fill="white" opacity="0.7"/>
  <rect x="65" y="88" width="55" height="4" rx="2" fill="white" opacity="0.5"/>
  <rect x="65" y="100" width="65" height="4" rx="2" fill="white" opacity="0.7"/>
  <rect x="65" y="112" width="40" height="4" rx="2" fill="white" opacity="0.5"/>
  <!-- 金额区域 -->
  <rect x="65" y="128" width="50" height="16" rx="3" fill="white" opacity="0.9"/>
  <!-- AI图标 - 右下角 -->
  <circle cx="140" cy="145" r="18" fill="#FF6B35" stroke="#E55A2B" stroke-width="1.5"/>
  <text x="140" y="150" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="Arial">AI</text>
</svg>
